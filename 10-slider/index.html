<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slider com Splide</title>
<!-- importando o css da lib splid (sempre antes do nosso css) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Slider de conteúdo usando a lib Splide</h1>
  <p>Site oficial: <a href="https://splidejs.com/" target="_blank">https://splidejs.com/</a></p>
  
  <hr>

  <div class="slider splide">
    <div class="splide__track">
      <ul class="splide__list">
        <li class="splide__slide">
          <figure>
            <img src="imagens/slider-foto01.jpg" alt="">
            <figcaption>Ferias em Londres</figcaption>
          </figure>
        </li>
        <li class="splide__slide">
          <figure>
            <img src="imagens/slider-foto02.jpg" alt="">
            <figcaption>Predio cheio de mato</figcaption>
          </figure>
        </li>
        <li class="splide__slide">
          <figure>
            <img src="imagens/slider-foto03.jpg" alt="">
            <figcaption>Raios e trovoes</figcaption>
          </figure>
        </li>
        <li class="splide__slide">
          <figure>
            <img src="imagens/slider-foto04.jpg" alt="">
            <figcaption>Predios grandes vermelhos</figcaption>
          </figure>
        </li>
      </ul>

    </div>
    
  </div>
<!-- Importando  o JS da lib splid(sempre antes antes do JS) -->
  <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>

   <script src="10-slider.js"></script>

</body>

</html>
